<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Hints → Matched Questions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f1ec;--surface:#ffffff;--border:#e0d8ce;--text:#1a1714;--muted:#7a7068;
  --accent:#7C3AED;--path:#0F766E;--path-light:#e8f5f2;
  --pharm:#7C3AED;--pharm-light:#f0ebfc;
  --gold:#d97706;--gold-light:#fef3e3;--green:#15803d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

.topbar{background:var(--text);color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:15px;font-weight:600;}
.topbar p{font-size:11px;opacity:.7;margin-top:2px;}
.stats{display:flex;gap:16px;font-size:11px;opacity:.75;}

.filterbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.filterbar label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.search-box{flex:1;min-width:200px;max-width:300px;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;background:var(--bg);}
.search-box:focus{border-color:var(--accent);}
.toggle-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;color:var(--muted);}
.toggle-btn.on{background:var(--text);color:white;border-color:var(--text);}
.count-pill{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}

.main{padding:20px 24px;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}

.batch-sep{background:var(--bg);border-top:2px solid var(--border);border-bottom:2px solid var(--border);padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:4px 0;}

.hint-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .15s;}
.hint-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);}
.hint-header{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.hint-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:28px;}
.hint-label{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.match-count{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:20px;background:var(--gold-light);color:var(--gold);font-weight:500;}
.chevron{font-size:11px;color:var(--muted);transition:transform .2s;}
.hint-card.open .chevron{transform:rotate(90deg);}

.matches{display:none;border-top:1px solid var(--border);}
.hint-card.open .matches{display:block;}
.match{padding:12px 16px 12px 28px;border-bottom:1px solid var(--border);position:relative;}
.match:last-child{border-bottom:none;}
.match-rank{position:absolute;left:10px;top:14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);}
.match-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.src-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;}
.src-badge.path{background:var(--path-light);color:var(--path);}
.src-badge.pharm{background:var(--pharm-light);color:var(--pharm);}
.batch-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
.batch-badge.b1{background:#e0f2fe;color:#0369a1;}
.batch-badge.b2{background:#fce7f3;color:#9d174d;}
.q-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.conf-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;}
.conf-high{background:#d1fae5;color:#065f46;}
.conf-med{background:#fef3c7;color:#92400e;}
.q-text{font-size:12.5px;line-height:1.65;color:var(--text);white-space:pre-wrap;}
.q-answer{margin-top:6px;font-size:11.5px;font-weight:600;color:var(--green);}
</style>
</head>

let showPath=true, showPharm=true, showB1=true, showB2=true, allOpen=false;

function confLabel(c) {
  return c==='high'
    ? '<span class="conf-badge conf-high">Strong match</span>'
    : '<span class="conf-badge conf-med">Possible match</span>';
}

function renderAll() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const main   = document.getElementById('main');
  main.innerHTML = '';
  let shown = 0;

  const allHints = [
    ...HINTS1.map(h => ({...h, batch:'b1'})),
    ...HINTS2.map(h => ({...h, batch:'b2'}))
  ];

  let prevBatch = null;
  allHints.forEach(hint => {
    if (hint.batch==='b1' && !showB1) return;
    if (hint.batch==='b2' && !showB2) return;
    if (search && !hint.label.toLowerCase().includes(search)) return;

    const vis = hint.matches.filter(m =>
      (m.src==='path'  && showPath) ||
      (m.src==='pharm' && showPharm)
    );
    if (!vis.length) return;

    if (hint.batch !== prevBatch) {
      const sep = document.createElement('div');
      sep.className = 'batch-sep';
      sep.textContent = hint.batch==='b1'
        ? '── Batch 1  (CumulativeCVQ.html)'
        : '── Batch 2  (CumulativeCVQ2.html)';
      main.appendChild(sep);
      prevBatch = hint.batch;
    }

    const card = document.createElement('div');
    card.className = 'hint-card' + (allOpen ? ' open' : '');
    card.innerHTML =
      `<div class="hint-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="hint-num">${hint.num!=='—'?'#'+hint.num:'—'}</span>
        <span class="hint-label">${hint.label}</span>
        <span class="batch-badge ${hint.batch}">${hint.batch==='b1'?'Batch 1':'Batch 2'}</span>
        <span class="match-count">${vis.length} match${vis.length!==1?'es':''}</span>
        <span class="chevron">&#9658;</span>
      </div>
      <div class="matches">${
        vis.map((m,mi) =>
          `<div class="match">
            <span class="match-rank">${mi+1}</span>
            <div class="match-meta">
              <span class="src-badge ${m.src}">${m.src==='path'?'Pathology':'Pharmacology'}</span>
              <span class="q-num">Q#${m.qnum}</span>
              ${confLabel(m.conf)}
            </div>
            <div class="q-text">${m.q}</div>
            <div class="q-answer">&#10003; Answer: ${m.a}</div>
          </div>`
        ).join('')
      }</div>`;
    main.appendChild(card);
    shown++;
  });

  document.getElementById('countPill').textContent = `Showing ${shown} hints`;
  document.getElementById('stat-shown').textContent = `${shown} hints`;
}

function toggleSrc(src) {
  if (src==='path')  { showPath  = !showPath;  document.getElementById('btn-path').classList.toggle('on',showPath);   }
  if (src==='pharm') { showPharm = !showPharm; document.getElementById('btn-pharm').classList.toggle('on',showPharm); }
  renderAll();
}

function toggleBatch(b) {
  if (b===1) { showB1 = !showB1; document.getElementById('btn-b1').classList.toggle('on',showB1); }
  if (b===2) { showB2 = !showB2; document.getElementById('btn-b2').classList.toggle('on',showB2); }
  renderAll();
}

function toggleAll() {
  allOpen = !allOpen;
  const btn = document.getElementById('btn-expand');
  btn.textContent = allOpen ? 'Collapse all' : 'Expand all';
  btn.classList.toggle('on', allOpen);
  document.querySelectorAll('.hint-card').forEach(c => c.classList.toggle('open', allOpen));
}

renderAll();
</script>
